basePath: /api/v1
definitions:
  types.AdminAddContractReq:
    properties:
      address:
        description: 合约地址
        type: string
      banner_uri:
        description: Banner图片
        type: string
      chain_id:
        description: 链ID
        type: integer
      creator:
        description: 创建者地址
        type: string
      description:
        description: 描述
        type: string
      discord:
        description: Discord链接
        type: string
      image_uri:
        description: 项目图片
        type: string
      instagram:
        description: Instagram链接
        type: string
      name:
        description: 合约名称
        type: string
      symbol:
        description: 项目标识
        type: string
      token_standard:
        description: 合约实现标准(721/1155)
        type: integer
      twitter:
        description: Twitter链接
        type: string
      website:
        description: 官网
        type: string
    required:
    - address
    - chain_id
    - name
    - symbol
    - token_standard
    type: object
  types.AdminRefreshMetadataReq:
    properties:
      chain_id:
        description: 链ID
        type: integer
      contract_addr:
        description: 合约地址
        type: string
      token_ids:
        description: Token ID列表(可选，为空则刷新所有)
        items:
          type: string
        type: array
    required:
    - chain_id
    - contract_addr
    type: object
  types.AdminSyncContractReq:
    properties:
      chain_id:
        description: 链ID
        type: integer
      contract_addr:
        description: 合约地址
        type: string
      end_block:
        description: 结束区块(可选)
        type: integer
      start_block:
        description: 起始区块(可选)
        type: integer
    required:
    - chain_id
    - contract_addr
    type: object
  types.AdminSyncTokenReq:
    properties:
      chain_id:
        description: 链ID
        type: integer
      contract_addr:
        description: 合约地址
        type: string
      token_id:
        description: Token ID
        type: string
    required:
    - chain_id
    - contract_addr
    - token_id
    type: object
  types.AdminUpdateContractReq:
    properties:
      auth:
        description: 认证状态
        type: integer
      banner_uri:
        description: Banner图片
        type: string
      description:
        description: 描述
        type: string
      discord:
        description: Discord链接
        type: string
      image_uri:
        description: 项目图片
        type: string
      instagram:
        description: Instagram链接
        type: string
      name:
        description: 合约名称
        type: string
      symbol:
        description: 项目标识
        type: string
      twitter:
        description: Twitter链接
        type: string
      website:
        description: 官网
        type: string
    type: object
  types.COSCredentials:
    properties:
      sessionToken:
        type: string
      tmpSecretId:
        type: string
      tmpSecretKey:
        type: string
    type: object
  types.COSTokenRequest:
    properties:
      file_name:
        description: 文件名
        type: string
      file_size:
        description: 文件大小（字节）
        type: integer
      file_type:
        description: 文件类型：image, video, audio, document
        type: string
    required:
    - file_name
    - file_size
    - file_type
    type: object
  types.COSTokenResp:
    properties:
      result:
        $ref: '#/definitions/types.COSTokenResponse'
    type: object
  types.COSTokenResponse:
    properties:
      allowActions:
        items:
          type: string
        type: array
      allowPrefix:
        type: string
      bucket:
        type: string
      credentials:
        $ref: '#/definitions/types.COSCredentials'
      expiration:
        type: string
      expiredTime:
        type: integer
      key:
        description: 生成的文件路径
        type: string
      region:
        type: string
      requestId:
        type: string
      startTime:
        type: string
      uploadUrl:
        type: string
    type: object
  types.COSUploadResult:
    properties:
      bucket:
        type: string
      etag:
        type: string
      key:
        type: string
      location:
        type: string
    type: object
  types.CollectionRankingResp:
    properties:
      result: {}
    type: object
  types.CommonResp:
    properties:
      result: {}
    type: object
  types.ItemTraitsResp:
    properties:
      result: {}
    type: object
  types.LoginReq:
    properties:
      address:
        type: string
      chain_id:
        type: integer
      message:
        type: string
      signature:
        type: string
    type: object
  types.MetaNodeBatchMintRequest:
    properties:
      chain_id:
        description: 链ID
        type: integer
      mints:
        description: 批量铸造信息
        items:
          $ref: '#/definitions/types.MetaNodeSingleMintInfo'
        type: array
    required:
    - chain_id
    - mints
    type: object
  types.MetaNodeMintRequest:
    properties:
      chain_id:
        description: 链ID
        type: integer
      description:
        description: NFT描述（可选，用于记录）
        type: string
      name:
        description: NFT名称（可选，用于记录）
        type: string
      to_address:
        description: 接收地址
        type: string
      token_uri:
        description: NFT元数据URI
        type: string
    required:
    - chain_id
    - to_address
    - token_uri
    type: object
  types.MetaNodeMintResponse:
    properties:
      contract_addr:
        description: 合约地址
        type: string
      message:
        description: 响应消息
        type: string
      result:
        $ref: '#/definitions/types.MetaNodeMintResult'
      token_id:
        description: Token ID
        type: string
      transaction_id:
        description: 交易ID（同tx_hash）
        type: string
    type: object
  types.MetaNodeMintResult:
    properties:
      block_number:
        description: 区块号（确认后）
        type: integer
      gas_price:
        description: Gas价格
        type: string
      gas_used:
        description: 消耗的Gas
        type: integer
      status:
        description: '交易状态: pending, confirmed, failed'
        type: string
      token_id:
        description: 生成的Token ID
        type: string
      tx_hash:
        description: 交易哈希
        type: string
    type: object
  types.MetaNodeSingleMintInfo:
    properties:
      description:
        description: NFT描述（可选）
        type: string
      name:
        description: NFT名称（可选）
        type: string
      to_address:
        description: 接收地址
        type: string
      token_uri:
        description: NFT元数据URI
        type: string
    required:
    - to_address
    - token_uri
    type: object
  types.MintRequest:
    properties:
      attributes:
        description: JSON string of attributes
        type: string
      chain_id:
        type: integer
      description:
        type: string
      name:
        type: string
      to_address:
        type: string
      token_uri:
        type: string
    required:
    - chain_id
    - to_address
    - token_uri
    type: object
  types.MintResponse:
    properties:
      result:
        $ref: '#/definitions/types.MintResult'
      token_id:
        type: string
      transaction_id:
        type: string
    type: object
  types.MintResult:
    properties:
      status:
        type: string
      token_id:
        type: string
      tx_hash:
        type: string
    type: object
  types.UserLoginResp:
    properties:
      result: {}
    type: object
info:
  contact: {}
  title: EasySwap Backend API
  version: "1.0"
